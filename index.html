<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Gamebibliotheek</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Gamebibliotheek</h1>

<form id="add-game-form">
    <input type="text" id="name" placeholder="Naam" required>
    <select id="genre" required>
        <option value="">Kies genre</option>
        <option value="Actie">Actie</option>
        <option value="Avontuur">Avontuur</option>
        <option value="Strategie">Strategie</option>
        <option value="Sport">Sport</option>
    </select>
    <input type="number" id="score" placeholder="Score (0-10)" min="0" max="10" required>
    <button type="submit">Toevoegen</button>
</form>

<div id="sort-buttons">
    <button id="sort-genre">Sorteer op genre ▲</button>
    <button id="sort-score">Sorteer op score ▲</button>
</div>

<div id="game-container"></div>

<script src="script.js"></script>
</body>
</html>
